<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileFlux - 简易文件传输</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>📁 FileFlux</h1>
        <p>局域网高速文件传输助手</p>
    </header>

    <div class="container">
        <!-- 上传区域 (拖拽 + 点击) -->
        <div class="upload-section">
            <div id="drop-zone" class="drop-zone">
                <div class="icon">☁️</div>
                <p>点击或拖拽文件到此处上传</p>
                <input type="file" id="fileInput" multiple style="display: none;">
            </div>
            
            <!-- 进度条容器 -->
            <div id="progress-wrapper" style="display: none;">
                <div class="progress-info">
                    <span id="progress-text">正在上传...</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="progress-container">
                    <div id="progress-bar"></div>
                </div>
            </div>
            <div id="message"></div>
        </div>

        <!-- 文件列表 -->
        <div id="file-list-section">
            <div class="section-header">
                <h2>📂 文件列表</h2>
                <button onclick="refreshFiles()" class="refresh-btn" title="刷新列表">🔄</button>
            </div>
            <ul id="files" class="file-grid"></ul>
        </div>
    </div>

    <!-- 文件详情模态框 -->
    <div id="modal-overlay" class="modal-overlay" onclick="closeFileDetail()"></div>
    <div id="file-detail-modal" class="modal">
        <div class="modal-header">
            <h3>📄 文件详情</h3>
            <button onclick="closeFileDetail()" class="close-btn">&times;</button>
        </div>
        <div class="modal-body">
            <div class="detail-row">
                <span class="label">文件名:</span>
                <span id="detail-filename" class="value"></span>
            </div>
            <div class="detail-row">
                <span class="label">大小:</span>
                <span id="detail-size" class="value"></span>
            </div>
            <div class="detail-row">
                <span class="label">修改时间:</span>
                <span id="detail-modified" class="value"></span>
            </div>
        </div>
        <div class="modal-footer">
            <a id="download-link" href="#" class="btn btn-primary">⬇️ 下载文件</a>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('fileInput');

        // 绑定点击事件触发文件选择
        dropZone.addEventListener('click', () => fileInput.click());

        // 绑定文件选择事件
        fileInput.addEventListener('change', handleFiles);

        // 绑定拖拽事件
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, highlight, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, unhighlight, false);
        });

        function highlight() { dropZone.classList.add('highlight'); }
        function unhighlight() { dropZone.classList.remove('highlight'); }

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleUpload(files);
        }
        dropZone.addEventListener('drop', handleDrop, false);

        function handleFiles() {
            const files = this.files;
            handleUpload(files);
        }

        // 核心上传逻辑
        async function handleUpload(files) {
            if (files.length === 0) return;

            const progressWrapper = document.getElementById('progress-wrapper');
            const progressBar = document.getElementById('progress-bar');
            const progressPercent = document.getElementById('progress-percent');
            const messageDiv = document.getElementById('message');

            progressWrapper.style.display = 'block';
            messageDiv.textContent = '';
            
            let totalFiles = files.length;
            let completedFiles = 0;

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                try {
                    await uploadSingleFile(file, (percent) => {
                        if(files.length === 1) {
                             progressBar.style.width = percent + '%';
                             progressPercent.textContent = percent + '%';
                        }
                    });
                    completedFiles++;
                    if (files.length > 1) {
                         const percent = Math.round((completedFiles / totalFiles) * 100);
                         progressBar.style.width = percent + '%';
                         progressPercent.textContent = `已完成 ${completedFiles}/${totalFiles}`;
                    }
                } catch (error) {
                    console.error(error);
                    // 演示模式下虽然上传失败，但也给个提示
                    if (window.location.protocol === 'blob:' || window.location.protocol === 'about:') {
                        messageDiv.innerHTML += `<div class="error" style="color:orange">⚠️ 预览模式无法实际上传: ${file.name}</div>`;
                    } else {
                        messageDiv.innerHTML += `<div class="error">❌ ${file.name} 上传失败</div>`;
                    }
                }
            }

            if (completedFiles === totalFiles) {
                messageDiv.innerHTML = `<div class="success">✅ 所有文件上传成功</div>`;
                refreshFiles();
                setTimeout(() => {
                    progressWrapper.style.display = 'none';
                    progressBar.style.width = '0%';
                }, 3000);
            }
        }

        function uploadSingleFile(file, onProgress) {
            return new Promise((resolve, reject) => {
                // 检查是否在预览环境
                if (window.location.protocol === 'blob:' || window.location.protocol === 'about:') {
                     // 模拟上传延迟
                     let progress = 0;
                     const interval = setInterval(() => {
                         progress += 10;
                         onProgress(progress);
                         if (progress >= 100) {
                             clearInterval(interval);
                             resolve(); // 伪装成功
                         }
                     }, 50);
                     return;
                }

                const xhr = new XMLHttpRequest();
                xhr.open("POST", "/");
                xhr.setRequestHeader("Filename", encodeURIComponent(file.name));

                xhr.upload.onprogress = function(e) {
                    if (e.lengthComputable) {
                        const percentComplete = Math.round((e.loaded / e.total) * 100);
                        onProgress(percentComplete);
                    }
                };

                xhr.onload = function() {
                    if (xhr.status === 200) {
                        resolve();
                    } else {
                        reject("Upload failed");
                    }
                };

                xhr.onerror = function() { reject("Network error"); };

                const reader = new FileReader();
                reader.onload = function(e) {
                    xhr.send(e.target.result);
                };
                reader.readAsArrayBuffer(file);
            });
        }

        // 从后端获取列表
        async function refreshFiles() {
            try {
                const response = await fetch("/list");
                if (!response.ok) throw new Error("Server error");
                const files = await response.json();
                renderFileList(files);
            } catch (error) {
                console.warn("无法连接到后端服务器，切换到演示模式。", error);
                // 演示数据 (Mock Data)
                const demoFiles = [
                    { name: "示例图片.jpg", encoded_name: "demo_image.jpg", size: 102400, last_modified: Date.now() / 1000 },
                    { name: "项目报告.pdf", encoded_name: "project_report.pdf", size: 2048576, last_modified: Date.now() / 1000 - 3600 },
                    { name: "备份文件.zip", encoded_name: "backup.zip", size: 52428800, last_modified: Date.now() / 1000 - 86400 }
                ];
                renderFileList(demoFiles);
                
                // 在界面上显示一个小提示
                const listSection = document.getElementById("file-list-section");
                if (!document.getElementById("demo-warning")) {
                    const warning = document.createElement("div");
                    warning.id = "demo-warning";
                    warning.style.color = "#856404";
                    warning.style.backgroundColor = "#fff3cd";
                    warning.style.padding = "0.5rem";
                    warning.style.marginBottom = "1rem";
                    warning.style.borderRadius = "4px";
                    warning.style.textAlign = "center";
                    warning.innerHTML = "⚠️ 当前为预览/离线模式，显示的为演示数据。请运行 <code>python server.py</code> 启动完整功能。";
                    listSection.insertBefore(warning, listSection.querySelector('ul'));
                }
            }
        }

        function renderFileList(files) {
            const ul = document.getElementById("files");
            ul.innerHTML = "";
            
            if (files.length === 0) {
                ul.innerHTML = '<li class="empty-state">暂无文件，请上传</li>';
                return;
            }

            files.forEach(file => {
                const li = document.createElement("li");
                
                // 文件图标逻辑
                const ext = file.name.split('.').pop().toLowerCase();
                let icon = '📄';
                if (['png','jpg','jpeg','gif'].includes(ext)) icon = '🖼️';
                if (['zip','rar','7z','tar'].includes(ext)) icon = '📦';
                if (['mp4','mov'].includes(ext)) icon = '🎬';

                li.innerHTML = `
                    <div class="file-info" onclick="showFileDetails('${file.encoded_name}')">
                        <span class="file-icon">${icon}</span>
                        <span class="file-name">${file.name}</span>
                    </div>
                    <button class="delete-btn" onclick="deleteFile('${file.encoded_name}')" title="删除">🗑️</button>
                `;
                ul.appendChild(li);
            });
        }

        function deleteFile(filename) {
            if (!confirm(`确定要删除这个文件吗？`)) return;

            fetch(`/delete/${filename}`, { method: 'DELETE' })
            .then(res => {
                if (!res.ok) throw new Error("Delete failed");
                return res.json();
            })
            .then(data => {
                if (data.success) {
                    refreshFiles();
                } else {
                    alert(`删除失败：${data.error}`);
                }
            })
            .catch(err => {
                console.error(err);
                alert("删除失败：无法连接到服务器 (预览模式不支持删除)");
            });
        }

        function showFileDetails(encodedName) {
            fetch(`/details/${encodedName}`)
                .then(res => {
                    if (!res.ok) throw new Error("Fetch failed");
                    return res.json();
                })
                .then(data => {
                    updateModal(data);
                })
                .catch(err => {
                    console.warn("Using mock detail data", err);
                    // 模拟详情数据
                    const mockData = {
                        name: decodeURIComponent(encodedName) || "演示文件",
                        size: 1024 * 1024 * 2.5, // 2.5 MB
                        last_modified: Date.now() / 1000
                    };
                    updateModal(mockData);
                });
        }

        function updateModal(data) {
            document.getElementById('detail-filename').textContent = data.name;
            document.getElementById('detail-size').textContent = formatBytes(data.size);
            document.getElementById('detail-modified').textContent = new Date(data.last_modified * 1000).toLocaleString();
            
            // 只是为了演示，链接可能无效
            document.getElementById('download-link').href = '/' + encodeURIComponent(data.name);
            document.getElementById('download-link').onclick = (e) => {
                if (window.location.protocol === 'blob:') {
                    e.preventDefault();
                    alert("预览模式无法下载真实文件。");
                }
            };
            
            document.getElementById('file-detail-modal').style.display = 'block';
            document.getElementById('modal-overlay').style.display = 'block';
        }

        function closeFileDetail() {
            document.getElementById('file-detail-modal').style.display = 'none';
            document.getElementById('modal-overlay').style.display = 'none';
        }

        function formatBytes(bytes, decimals = 2) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }

        // 自动刷新与初始加载
        // 在预览模式下，为了避免频繁报错，可以去掉自动刷新，或者让刷新函数内部处理错误
        setInterval(refreshFiles, 8000); 
        refreshFiles();
    </script>
</body>
</html>
